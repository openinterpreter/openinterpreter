name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.0.0"
      targets:
        description: "Release targets to build: all or comma-separated target triples"
        required: true
        default: "all"
      publish:
        description: "Publish release after building. Only valid with targets=all."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      publish: ${{ steps.matrix.outputs.publish }}
    steps:
      - name: Select targets
        id: matrix
        shell: bash
        env:
          TARGETS: ${{ github.event_name == 'workflow_dispatch' && inputs.targets || 'all' }}
          PUBLISH: ${{ github.event_name == 'push' && 'true' || inputs.publish }}
        run: |
          set -euo pipefail
          ruby <<'RUBY' >> "$GITHUB_OUTPUT"
          require "json"

          all = [
            {"runner"=>"macos-15", "target"=>"aarch64-apple-darwin", "archive"=>"open-interpreter-aarch64-apple-darwin.tar.gz"},
            {"runner"=>"macos-15-intel", "target"=>"x86_64-apple-darwin", "archive"=>"open-interpreter-x86_64-apple-darwin.tar.gz"},
            {"runner"=>"ubuntu-24.04", "target"=>"x86_64-unknown-linux-gnu", "archive"=>"open-interpreter-x86_64-unknown-linux-gnu.tar.gz"},
            {"runner"=>"ubuntu-24.04-arm", "target"=>"aarch64-unknown-linux-gnu", "archive"=>"open-interpreter-aarch64-unknown-linux-gnu.tar.gz"},
            {"runner"=>"windows-2025", "target"=>"x86_64-pc-windows-msvc", "archive"=>"open-interpreter-x86_64-pc-windows-msvc.tar.gz"},
            {"runner"=>"windows-11-arm", "target"=>"aarch64-pc-windows-msvc", "archive"=>"open-interpreter-aarch64-pc-windows-msvc.tar.gz"},
          ]

          targets = ENV.fetch("TARGETS").split(",").map(&:strip).reject(&:empty?)
          selected = if targets == ["all"]
            all
          else
            known = all.to_h { |entry| [entry.fetch("target"), entry] }
            unknown = targets - known.keys
            abort "unknown release target(s): #{unknown.join(", ")}" unless unknown.empty?
            targets.map { |target| known.fetch(target) }
          end

          publish = ENV.fetch("PUBLISH") == "true"
          abort "publish=true requires targets=all" if publish && selected.length != all.length

          puts "matrix=#{JSON.generate({"include"=>selected})}"
          puts "publish=#{publish}"
          RUBY

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev libubsan1

      - name: Use hermetic Cargo home for musl
        if: contains(matrix.target, 'unknown-linux-musl')
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig for musl
        if: contains(matrix.target, 'unknown-linux-musl')
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.14.0

      - name: Install musl build tools
        if: contains(matrix.target, 'unknown-linux-musl')
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc UBSan wrapper
        if: contains(matrix.target, 'unknown-linux-musl')
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi

          wrapper="${RUNNER_TEMP:-/tmp}/rustc-ubsan-wrapper"
          {
            printf '%s\n' '#!/usr/bin/env bash'
            printf '%s\n' 'set -euo pipefail'
            printf '%s\n' 'if [[ -n "${RUSTC_UBSAN_PRELOAD:-}" ]]; then'
            printf '%s\n' '  export LD_PRELOAD="${RUSTC_UBSAN_PRELOAD}${LD_PRELOAD:+:${LD_PRELOAD}}"'
            printf '%s\n' 'fi'
            printf '%s\n' 'exec "$1" "${@:2}"'
          } > "${wrapper}"
          chmod +x "${wrapper}"

          echo "RUSTC_UBSAN_PRELOAD=${ubsan}" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags
        if: contains(matrix.target, 'unknown-linux-musl')
        shell: bash
        run: |
          set -euo pipefail

          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"

          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          echo "CFLAGS=$(sanitize_flags "${CFLAGS-}")" >> "$GITHUB_ENV"
          echo "CXXFLAGS=$(sanitize_flags "${CXXFLAGS-}")" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifacts
        if: contains(matrix.target, 'unknown-linux-musl')
        uses: ./.github/actions/setup-rusty-v8-musl
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          target: ${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "${{ matrix.target }}" \
            --bin interpreter \
            --bin interpreter-root-tui \
            --bin interpreter-tui \
            --bin interpreter-app-server \
            --bin codex-exec &
          cargo_pid="$!"
          while kill -0 "${cargo_pid}" 2>/dev/null; do
            echo "cargo release build still running for ${{ matrix.target }} at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            sleep 60
          done
          wait "${cargo_pid}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          release_dir="target/${{ matrix.target }}/release"
          workspace_dir="${GITHUB_WORKSPACE}"
          temp_dir="${RUNNER_TEMP}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            workspace_dir="$(cygpath -u "${workspace_dir}")"
            temp_dir="$(cygpath -u "${temp_dir}")"
          fi
          dist_dir="${workspace_dir}/dist/${{ matrix.target }}"
          package_dir="${temp_dir}/open-interpreter"
          rm -rf "${package_dir}"
          mkdir -p "${package_dir}"

          suffix=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            suffix=".exe"
          fi

          for binary in interpreter interpreter-root-tui interpreter-tui interpreter-app-server codex-exec; do
            cp "${release_dir}/${binary}${suffix}" "${package_dir}/${binary}${suffix}"
            chmod 0755 "${package_dir}/${binary}${suffix}"
          done

          {
            printf '%s\n' 'Open Interpreter standalone release archive.'
            printf '\n'
            printf '%s\n' 'Put this directory on PATH or use scripts/install/install.sh to install the'
            printf '%s\n' 'interpreter launcher into ~/.local/bin.'
          } > "${package_dir}/README.txt"

          mkdir -p "${dist_dir}"
          tar -C "${temp_dir}" -czf "${dist_dir}/${{ matrix.archive }}" open-interpreter
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${dist_dir}/${{ matrix.archive }}" > "${dist_dir}/${{ matrix.archive }}.sha256"
          else
            sha256sum "${dist_dir}/${{ matrix.archive }}" > "${dist_dir}/${{ matrix.archive }}.sha256"
          fi

      - uses: actions/upload-artifact@2848b2cda0e5190984587ec6bb1f36730ca78d50
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    if: ${{ needs.prepare.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ inputs.version }}"
            tag="v${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create manifest
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          {
            printf '{\n'
            printf '  "version": "%s",\n' "${version}"
            printf '  "assets": [\n'
            first=1
            for archive in dist/open-interpreter-*.tar.gz; do
              name="$(basename "${archive}")"
              if command -v shasum >/dev/null 2>&1; then
                sha="$(shasum -a 256 "${archive}" | awk '{print $1}')"
              else
                sha="$(sha256sum "${archive}" | awk '{print $1}')"
              fi
              target="${name#open-interpreter-}"
              target="${target%.tar.gz}"
              if [[ "${first}" -eq 0 ]]; then
                printf ',\n'
              fi
              first=0
              printf '    {"target": "%s", "name": "%s", "sha256": "%s"}' "${target}" "${name}" "${sha}"
            done
            printf '\n  ]\n'
            printf '}\n'
          } > dist/open-interpreter-manifest.json

      - name: Publish release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Open Interpreter ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/open-interpreter-*.tar.gz
            dist/open-interpreter-*.tar.gz.sha256
            dist/open-interpreter-manifest.json
